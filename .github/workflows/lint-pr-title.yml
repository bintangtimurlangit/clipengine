# Require PR titles to follow Conventional Commits so squash/merge messages stay consistent.
# https://github.com/amannn/action-semantic-pull-request
name: Lint PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - dev
      - main

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
