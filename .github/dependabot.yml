# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# Commit messages follow https://www.conventionalcommits.org/en/v1.0.0/ (type: chore, scope implied by prefix)
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    # passlib 1.7.4 breaks with bcrypt 5.x; keep upper bound <5 until we replace passlib or upgrade.
    ignore:
      - dependency-name: "bcrypt"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
