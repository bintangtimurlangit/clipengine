# Production — baked Next.js image, API without source bind-mount or --reload.
# Default for most users: docker compose up --build
#
# Development (hot reload): docker-compose.dev.yml

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      CLIPENGINE_DATA_DIR: /data
      CLIPENGINE_WORKSPACE: /workspace
      CORS_ORIGINS: http://localhost:3000
      # Optional: force workers on/off (overrides Settings). Omit both to use Settings → Instance.
      # CLIPENGINE_USE_DOCKER_WORKERS: "true"
      CLIPENGINE_WORKER_IMAGE: clipengine-worker:latest
      # When workers are enabled, must match `docker volume ls` (Compose: {project}_clipengine_data).
      CLIPENGINE_DOCKER_VOLUME_DATA: clipengine_clipengine_data
      CLIPENGINE_DOCKER_VOLUME_WORKSPACE: clipengine_clipengine_workspace
    volumes:
      - clipengine_data:/data
      - clipengine_workspace:/workspace
      # Uncomment to let the API spawn ephemeral worker containers (requires Docker socket):
      # - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Build only (not started by `docker compose up`): docker compose --profile worker build worker
  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: clipengine-worker:latest

volumes:
  clipengine_data:
  clipengine_workspace:
